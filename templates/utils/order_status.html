{% macro status_badge(status) %}
<span class="px-3 py-1 rounded-full text-xs font-bold
    {% if status == 'سفارش شما تکمیل شد' %} bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300
    {% elif 'لغو' in status %} bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300
    {% elif status == 'در حال آماده‌سازی' %} bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300
    {% elif status == 'تایید رستوران' %} bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300
    {% else %} bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300 {% endif %}">
    {{ status }}
</span>
{% endmacro %}
