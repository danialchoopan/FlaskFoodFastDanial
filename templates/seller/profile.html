{% extends "base.html" %}

{% block title %}پروفایل رستوران{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6">پروفایل رستوران</h1>

<form action="{{ url_for('web_seller.profile') }}" method="POST" enctype="multipart/form-data" class="max-w-2xl space-y-6">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">نام رستوران</label>
            <input type="text" name="restaurant_name" value="{{ seller.restaurant_name }}" class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">شهر</label>
                <input type="text" name="city_name" value="{{ seller.city_name }}" class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">دسته‌بندی</label>
                <input type="text" name="category" value="{{ seller.category }}" class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">آدرس</label>
            <input type="text" name="address" value="{{ seller.address or '' }}" class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">عرض جغرافیایی</label>
                <input type="number" step="any" name="latitude" value="{{ seller.latitude or '' }}" class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">طول جغرافیایی</label>
                <input type="number" step="any" name="longitude" value="{{ seller.longitude or '' }}" class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">بنر رستوران</label>
            <input type="file" name="banner" accept="image/*" class="w-full p-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm">
            {% if seller.image %}
            <p class="text-xs text-gray-400 mt-1">تصویر فعلی: {{ seller.image }}</p>
            {% endif %}
        </div>
        <div class="flex items-center gap-3">
            <input type="checkbox" name="open" id="openCheck" {{ 'checked' if seller.open }} class="w-4 h-4 text-red-600 rounded">
            <label for="openCheck" class="text-sm font-medium text-gray-700 dark:text-gray-300">رستوران باز است</label>
        </div>
    </div>

    <button type="submit" class="bg-red-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-700 transition">ذخیره تغییرات</button>
</form>
{% endblock %}
