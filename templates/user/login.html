{% extends "base.html" %}

{% block title %}ورود به حساب کاربری{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-8 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 mt-10">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6 text-center">ورود به دانیال فست فود</h1>

    <form action="{{ url_for('web_user.login') }}" method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">شماره تلفن</label>
            <input type="text" name="phone" required class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition-all" placeholder="09121111111">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">رمز عبور</label>
            <input type="password" name="password" required class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition-all" placeholder="******">
        </div>
        <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-red-100">
            ورود به حساب
        </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
        <p>هنوز ثبت نام نکرده‌اید؟ از طریق اپلیکیشن موبایل اقدام کنید.</p>
    </div>
</div>
{% endblock %}
