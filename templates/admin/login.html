{% extends "base.html" %}

{% block title %}ورود به پنل مدیریت | دانیال فست فود{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-8 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 mt-10">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-red-600">پنل مدیریت دانیال فست فود</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-2">لطفاً برای ورود مشخصات خود را وارد کنید</p>
    </div>

    <form action="{{ url_for('admin.login') }}" method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">نام کاربری</label>
            <input type="text" name="username" required class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition-all" placeholder="admin">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">رمز عبور</label>
            <input type="password" name="password" required class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition-all" placeholder="******">
        </div>
        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-red-100">
            ورود به پنل
        </button>
    </form>
</div>
{% endblock %}
